name: Déploiement GitHub Pages

on:
  push:
    branches:
      - claude/digital-concept-domain-lqrreg
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Cache-busting et version
        run: |
          VER="${GITHUB_SHA::8}"
          BUILD="$(date -u '+%d/%m/%Y %H:%M') UTC · ${VER}"
          echo "Version des assets : $VER"
          sed -i -E "s/(href|src)=\"(styles\.css|script\.js|i18n\.js|favicon\.svg)\"/\1=\"\2?v=$VER\"/g" index.html
          sed -i "s|__BUILD__|${BUILD}|g" index.html
          echo "Version injectée : ${BUILD}"
          grep -E "styles\.css|script\.js|favicon\.svg|Version en ligne" index.html

      - name: Uploader le site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
