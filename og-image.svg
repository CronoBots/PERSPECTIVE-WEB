<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Digital Concept — solutions digitales sur mesure">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <radialGradient id="glow1" cx="18%" cy="22%" r="55%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="88%" cy="78%" r="55%">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#070b14"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <g opacity="0.10" stroke="#9fb2cc" stroke-width="1">
    <path d="M0 158 H1200 M0 316 H1200 M0 474 H1200 M200 0 V630 M400 0 V630 M600 0 V630 M800 0 V630 M1000 0 V630"/>
  </g>
  <!-- Logo DC -->
  <g transform="translate(90 96)">
    <rect width="92" height="92" rx="22" fill="#0b1730" stroke="#21385a" stroke-width="2"/>
    <text x="46" y="62" font-family="'Space Grotesk',Arial,sans-serif" font-size="42" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="-2">DC</text>
    <circle cx="74" cy="20" r="6" fill="url(#g)"/>
  </g>
  <text x="208" y="158" font-family="'Space Grotesk',Arial,sans-serif" font-size="46" font-weight="700" fill="#eef3fb">Digital<tspan fill="url(#g)">Concept</tspan></text>
  <!-- Titre -->
  <text x="90" y="320" font-family="'Space Grotesk',Arial,sans-serif" font-size="70" font-weight="700" fill="#eef3fb" letter-spacing="-1">Des solutions digitales</text>
  <text x="90" y="400" font-family="'Space Grotesk',Arial,sans-serif" font-size="70" font-weight="700" letter-spacing="-1"><tspan fill="url(#g)">sur mesure</tspan><tspan fill="#eef3fb"> pour votre entreprise</tspan></text>
  <!-- Services -->
  <g font-family="Arial,sans-serif" font-size="26" fill="#9fb2cc">
    <text x="90" y="498">Sites web</text>
    <text x="290" y="498">Applications</text>
    <text x="520" y="498">IA</text>
    <text x="620" y="498">Crypto</text>
    <text x="790" y="498">Bots réseaux sociaux</text>
  </g>
  <g fill="url(#g)">
    <circle cx="262" cy="490" r="5"/><circle cx="492" cy="490" r="5"/><circle cx="572" cy="490" r="5"/><circle cx="752" cy="490" r="5"/>
  </g>
  <text x="90" y="575" font-family="'Space Mono',monospace" font-size="26" fill="#56c7fb" letter-spacing="2">digitalconcept.be</text>
</svg>
